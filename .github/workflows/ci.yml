name: CI

on:
  push:
  pull_request:

defaults:
  run:
    working-directory: fingerprint-engine

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fingerprint
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Enables the gated Postgres integration tests against the service above.
      FINGERPRINT_TEST_PG_DSN: postgresql://postgres:postgres@localhost:5432/fingerprint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (with all backends + dev tools)
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy fingerprint_engine

      - name: Tests (incl. live Postgres)
        run: pytest -q
